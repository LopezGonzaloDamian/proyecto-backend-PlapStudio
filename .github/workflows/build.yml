# .github/workflows/build.yml
# GitHub Actions documentation
# => https://docs.github.com/en/actions
name: build

# Controls when the action will run. Triggers the workflow on push or pull request
# events but only for the master branch
on:
  # Nota: Reemplazar "main, master" con las branches principales que se manejen (ej.: "main, develop")
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  gradle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # Execute Gradle commands in GitHub Actions workflows
      - uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission to Gradle wrapper
        run: chmod +x ./gradlew

      - name: Execute tests with coverage
        run: ./gradlew runOnGitHub

      - name: Check JaCoCo report
        id: jacoco_report
        run: |
          if [ -f build/reports/jacoco/test/jacocoTestReport.csv ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate JaCoCo Badge
        if: steps.jacoco_report.outputs.exists == 'true'
        id: jacoco
        uses: cicirello/jacoco-badge-generator@v2.11.0
        with:
          generate-branches-badge: true
          jacoco-csv-file: build/reports/jacoco/test/jacocoTestReport.csv

      - name: Log coverage percentage
        if: steps.jacoco_report.outputs.exists == 'true'
        run: |
          echo "coverage = ${{ steps.jacoco.outputs.coverage }}"
          echo "branch coverage = ${{ steps.jacoco.outputs.branches }}"

      - name: List files
        run: |
          ls -la .github

      - name: Commit and push the badge (if it changed)
        if: steps.jacoco_report.outputs.exists == 'true'
        uses: EndBug/add-and-commit@v9
        with:
          default_author: github_actions
          message: 'commit badge'
          add: '*.svg'

      - name: Upload JaCoCo coverage report
        if: steps.jacoco_report.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: build/reports/jacoco/
