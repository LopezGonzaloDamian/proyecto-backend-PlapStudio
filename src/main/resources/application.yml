server:
  address: 0.0.0.0
  port: 9000
  error:
    whitelabel:
      enabled: false
    include-message: always
    include-stacktrace: never
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/db_agendify
    username: agendify
    password: agendify
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
logging:
  level:
    root: INFO
integrations:
  n8n:
    turno-confirmado-url: http://localhost:5678/webhook-test/turno-confirmado
agendify:
  chatbot:
    ollama:
      enabled: true
      base-url: http://127.0.0.1:11434
      model: llama3.2:3b

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres:5432/db_agendify
integrations:
  n8n:
    turno-confirmado-url: http://n8n:5678/webhook-test/turno-confirmado
agendify:
  chatbot:
    ollama:
      enabled: true
      base-url: http://ollama:11434
      model: llama3.2:3b
