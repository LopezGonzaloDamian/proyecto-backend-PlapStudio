name: Sync GitHub Issue to Jira

on:
  issues:
    types: [opened, closed, labeled]

jobs:
  create-jira-issue:
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'
    steps:
      - name: Login to Jira
        uses: atlassian/gajira-login@v3
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_TOKEN_PLAPSTUDIO }}

      - name: Create Jira Issue
        id: create
        uses: atlassian/gajira-create@v3
        with:
          project: PLAP
          issuetype: Task
          summary: "${{ github.event.issue.title }}"
          description: "${{ github.event.issue.body }}\n\nGitHub Issue: ${{ github.event.issue.html_url }}"

      - name: Comment Jira ID on GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🔗 Jira Issue creada: **${{ steps.create.outputs.issue }}**`
            })

  transition-jira-issue:
    runs-on: ubuntu-latest
    if: github.event.action == 'labeled'
    steps:
      - name: Login to Jira
        uses: atlassian/gajira-login@v3
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_TOKEN_PLAPSTUDIO }}

      - name: Get Jira Issue ID from comments
        id: get-jira-id
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            const jiraComment = comments.data.find(c => c.body.includes('Jira Issue creada:'));
            if (!jiraComment) return '';
            const match = jiraComment.body.match(/\*\*(PLAP-\d+)\*\*/);
            return match ? match[1] : '';

      - name: Transition to TODO
        if: github.event.label.name == 'TODO' && steps.get-jira-id.outputs.result != ''
        uses: atlassian/gajira-transition@v3
        with:
          issue: "${{ steps.get-jira-id.outputs.result }}"
          transition: "TODO"

      - name: Transition to EN CURSO
        if: github.event.label.name == 'En curso' && steps.get-jira-id.outputs.result != ''
        uses: atlassian/gajira-transition@v3
        with:
          issue: "${{ steps.get-jira-id.outputs.result }}"
          transition: "EN CURSO"

      - name: Transition to EN REVISIÓN
        if: github.event.label.name == 'En Revisión' && steps.get-jira-id.outputs.result != ''
        uses: atlassian/gajira-transition@v3
        with:
          issue: "${{ steps.get-jira-id.outputs.result }}"
          transition: "EN REVISIÓN"

      - name: Transition to FINALIZADO
        if: github.event.label.name == 'Finalizado' && steps.get-jira-id.outputs.result != ''
        uses: atlassian/gajira-transition@v3
        with:
          issue: "${{ steps.get-jira-id.outputs.result }}"
          transition: "FINALIZADO"

  close-jira-issue:
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'
    steps:
      - name: Login to Jira
        uses: atlassian/gajira-login@v3
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_TOKEN_PLAPSTUDIO }}

      - name: Get Jira Issue ID from comments
        id: get-jira-id
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            const jiraComment = comments.data.find(c => c.body.includes('Jira Issue creada:'));
            if (!jiraComment) return '';
            const match = jiraComment.body.match(/\*\*(PLAP-\d+)\*\*/);
            return match ? match[1] : '';

      - name: Transition to FINALIZADO
        if: steps.get-jira-id.outputs.result != ''
        uses: atlassian/gajira-transition@v3
        with:
          issue: "${{ steps.get-jira-id.outputs.result }}"
          transition: "FINALIZADO"
