server:
  address: 0.0.0.0
  port: 9000
  error:
    whitelabel:
      enabled: false
    include-message: always
    include-stacktrace: never
spring:
  datasource:
    url: jdbc:postgresql://0.0.0.0:5432/db_agendify
    username: agendify
    password: agendify
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    show-sql: true
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
logging:
  level:
    root: INFO

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres:5432/db_agendify
