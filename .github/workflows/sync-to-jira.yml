name: Sync GitHub Issue to Jira

on:
  issues:
    types: [opened, closed, reopened, labeled]

jobs:
  create-jira-issue:
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'
    steps:
      - name: Login to Jira
        uses: atlassian/gajira-login@v3
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_TOKEN_PLAPSTUDIO }}

      - name: Create Jira Issue
        id: create
        uses: atlassian/gajira-create@v3
        with:
          project: PLAP
          issuetype: Task
          summary: "${{ github.event.issue.title }}"
          description: "${{ github.event.issue.body }}\n\nGitHub Issue: ${{ github.event.issue.html_url }}"

  transition-jira-issue:
    runs-on: ubuntu-latest
    if: github.event.action == 'labeled'
    steps:
      - name: Login to Jira
        uses: atlassian/gajira-login@v3
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_TOKEN_PLAPSTUDIO }}

      - name: Transition to TODO
        if: github.event.label.name == 'TODO'
        uses: atlassian/gajira-transition@v3
        with:
          issue: "PLAP-${{ github.event.issue.number }}"
          transition: "TODO"

      - name: Transition to EN CURSO
        if: github.event.label.name == 'En curso'
        uses: atlassian/gajira-transition@v3
        with:
          issue: "PLAP-${{ github.event.issue.number }}"
          transition: "EN CURSO"

      - name: Transition to EN REVISIÓN
        if: github.event.label.name == 'En Revisión'
        uses: atlassian/gajira-transition@v3
        with:
          issue: "PLAP-${{ github.event.issue.number }}"
          transition: "EN REVISIÓN"

      - name: Transition to FINALIZADO
        if: github.event.label.name == 'Finalizado'
        uses: atlassian/gajira-transition@v3
        with:
          issue: "PLAP-${{ github.event.issue.number }}"
          transition: "FINALIZADO"

  close-jira-issue:
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'
    steps:
      - name: Login to Jira
        uses: atlassian/gajira-login@v3
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_TOKEN_PLAPSTUDIO }}

      - name: Transition to FINALIZADO
        uses: atlassian/gajira-transition@v3
        with:
          issue: "PLAP-${{ github.event.issue.number }}"
          transition: "FINALIZADO"
